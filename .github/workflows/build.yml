name: Build Astra Browser

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name AstraBrowser main.py

      - uses: actions/upload-artifact@v4
        with:
          name: AstraBrowser-Windows
          path: dist/*

  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux
        run: |
          pyinstaller --onefile --windowed --name AstraBrowser main.py

      - uses: actions/upload-artifact@v4
        with:
          name: AstraBrowser-Linux
          path: dist/*